version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - soc_network
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb_tsdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=soc_org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=super_secret_token_123
    networks:
      - soc_network
    restart: unless-stopped

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: iot_simulator
    networks:
      - soc_network
    depends_on:
      - mosquitto
    restart: unless-stopped

  edr_engine:
    build:
      context: ./edr
      dockerfile: Dockerfile
    container_name: edr_ml_engine
    networks:
      - soc_network
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8001:8000"
    networks:
      - soc_network
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_soc_dashboard
    ports:
      - "3000:3000"
    networks:
      - soc_network
    restart: unless-stopped

networks:
  soc_network:
    driver: bridge
